apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  labels:
    app: emailservice
spec:
  replicas: {{ .Values.emailservice.replicas }}
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      labels:
        app: emailservice
    spec:
      serviceAccountName: emailservice
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: server
        image: "{{ .Values.global.imageRegistry }}/emailservice:{{ .Values.emailservice.imageTag | default .Values.global.imageTag }}"
        imagePullPolicy: {{ .Values.global.imagePullPolicy }}
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: DISABLE_PROFILER
          value: "1"
        livenessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: {{ .Values.emailservice.probeInitialDelay | default 10 }}
          periodSeconds: 5
        readinessProbe:
          grpc:
            port: 8080
          initialDelaySeconds: {{ .Values.emailservice.probeInitialDelay | default 10 }}
          periodSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.emailservice.resources.requests.cpu }}
            memory: {{ .Values.emailservice.resources.requests.memory }}
          limits:
            cpu: {{ .Values.emailservice.resources.limits.cpu }}
            memory: {{ .Values.emailservice.resources.limits.memory }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: true
