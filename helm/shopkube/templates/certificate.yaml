{{- if .Values.ingress.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: shopkube-tls
spec:
  secretName: {{ .Values.ingress.tlsSecret }}
  issuerRef:
    name: vault-issuer
    kind: ClusterIssuer
  commonName: {{ .Values.ingress.host }}
  dnsNames:
  - {{ .Values.ingress.host }}
  duration: 720h
  renewBefore: 240h
{{- end }}
